springdoc.paths-to-match=/api/auth/**,/api/users/**,/api/roles/**,/api/permissions/**,/api/role-permissions/**,/api/students/**

# Swagger UI — cùng origin với app nên cookie apiKey trong UI khớp cách AdminLTE gọi API
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
